    <meta charset="UTF-8">

    <title>Formulario de Registro - Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Formulario de Registro</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form action="#" method="POST">
                             
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre:<label>
                                <input type="text" class="form-control" id="nombre" placeholder="chepe toño" required>
                            </div>
                                                        <div class="mb-3">
                                <label for="nombre" class="form-label">Apellidos:<label>
                                <input type="text" class="form-control" id="nombre" placeholder="campos perez" required>
                            </div>
                                                       <div class="mb-3">
                                <label for="nombre" class="form-label">Fecha de Nacimiento:<label>
                                <input type="date" class="form-control" id="nombre" placeholder="campos perez" required>

                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo Electrónico:</label>
                                <input type="email" class="form-control" id="email" placeholder="****@gmail.com" required>
                                
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña:</label>
                                <input type="password" class="form-control" id="password" placeholder="****" required>
                                <div class="form-text">NO compartas tu contraseña.</div>
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="terminos" required>
                                <label class="form-check-label" for="terminos">Acepto los términos y condiciones</label>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Enviar Registro</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
